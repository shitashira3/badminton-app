<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <style>
      body { font-family: sans-serif; padding: 20px; }
      .form-group { margin-bottom: 15px; }
      label { display: block; margin-bottom: 5px; }
      input { padding: 8px; width: 200px; }
      button { padding: 10px 15px; cursor: pointer; margin-right: 5px; }
      .btn-save { background-color: #28a745; color: white; border: none; }
      .btn-reset { background-color: #dc3545; color: white; border: none; }
    </style>
  </head>
  <body>

    <form id="myForm">
      <div class="form-group">
        <label>วันที่:</label>
        <input type="date" id="dateInput" name="date" required>
      </div>

      <div class="form-group">
        <label>ยอดรวม/รายละเอียด:</label>
        <input type="number" id="amountInput" name="amount" placeholder="กรอกตัวเลข" required>
      </div>

      <button type="button" class="btn-save" onclick="submitData()">สรุปยอดทั้งหมด</button>
      <button type="button" class="btn-reset" onclick="resetForm()">ล้างค่า</button>
    </form>

    <div id="status" style="margin-top: 20px;"></div>

    <script>
      // 1. ตั้งค่าวันที่ปัจจุบันให้โดยอัตโนมัติ
      window.onload = function() {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('dateInput').value = today;
      };

      // 2. ฟังก์ชันล้างค่า (Reset)
      function resetForm() {
        document.getElementById("myForm").reset();
        // เซ็ตวันที่กลับเป็นปัจจุบันหลัง reset
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('dateInput').value = today;
        document.getElementById("status").innerHTML = "ล้างข้อมูลแล้ว";
      }

      // 3. ฟังก์ชันส่งข้อมูลไป Google Sheets
      function submitData() {
        const form = document.getElementById("myForm");
        const status = document.getElementById("status");
        
        if(!form.checkValidity()) {
          status.innerHTML = "กรุณากรอกข้อมูลให้ครบถ้วน";
          return;
        }

        const formData = {
          date: document.getElementById("dateInput").value,
          amount: document.getElementById("amountInput").value
        };

        status.innerHTML = "กำลังบันทึก...";

        google.script.run
          .withSuccessHandler(function(msg) {
            status.innerHTML = msg;
            resetForm(); // ล้างค่าหลังจากบันทึกสำเร็จ
          })
          .processForm(formData);
      }
    </script>
  </body>
</html>
